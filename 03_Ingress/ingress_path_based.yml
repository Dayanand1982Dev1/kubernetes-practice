apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-path-based
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /nginx(/|$)(.*)            #http://www.nextops.in/nginx/
        pathType: Prefix
        backend:
          service:
            name: nginx-service
            port:
              number: 80
      - path: /httpd(/|$)(.*)            #http://www.nextops.in/httpd/
        pathType: Prefix
        backend:
          service:
            name: httpd-service
            port:
              number: 80
      - path: /(.*)                       #http://www.nextops.in/
        pathType: Prefix
        backend:
          service:
            name: nginx-service
            port:
              number: 80

# These are all request routing rules for the Ingress resource.  
        